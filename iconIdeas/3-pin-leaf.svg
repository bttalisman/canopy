<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="pin3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="leafg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg3)"/>
  <!-- Map pin body -->
  <path d="M512 780 L400 500 Q360 400 400 310 Q440 220 512 200 Q584 220 624 310 Q664 400 624 500 Z" fill="url(#pin3)" opacity="0.9"/>
  <!-- Pin inner circle -->
  <circle cx="512" cy="370" r="80" fill="#1a1a2e" opacity="0.6"/>
  <circle cx="512" cy="370" r="50" fill="#4ade80" opacity="0.8"/>
  <!-- Leaf growing from top of pin -->
  <path d="M512 200 Q560 120 620 140 Q660 160 640 220 Q620 260 560 240 Q530 230 512 200 Z" fill="url(#leafg)" opacity="0.9"/>
  <path d="M512 200 Q530 160 520 140" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- Second smaller leaf -->
  <path d="M512 200 Q460 130 420 160 Q400 180 420 220 Q440 250 480 230 Q500 220 512 200 Z" fill="#4ade80" opacity="0.7"/>
</svg>
