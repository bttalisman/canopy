<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="leafRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="hole" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </radialGradient>
    <linearGradient id="cGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Pin body -->
  <path d="M 512 900
           C 360 700, 280 560, 292 400
           A 220 220 0 1 1 732 400
           C 744 560, 664 700, 512 900 Z"
        fill="url(#pinGrad)"/>

  <!-- Inner white circle -->
  <circle cx="512" cy="400" r="135" fill="url(#hole)"/>
  <circle cx="512" cy="400" r="135" fill="none" stroke="#16a34a" stroke-opacity="0.25" stroke-width="4"/>

  <!-- Letter C inside the hole -->
  <text x="512" y="400"
        font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
        font-size="200" font-weight="800"
        text-anchor="middle" dominant-baseline="central"
        fill="url(#cGrad)">C</text>

  <!-- Stem -->
  <path d="M 512 180 Q 518 200 512 220"
        stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Right leaf -->
  <path d="M 512 180 Q 560 100 620 120 Q 660 140 640 200 Q 620 240 560 220 Q 530 210 512 180 Z"
        fill="url(#leafRight)"/>
  <path d="M 512 180 Q 580 160 630 140"
        stroke="#16a34a" stroke-opacity="0.6" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M 512 180 Q 460 110 420 140 Q 400 160 420 200 Q 440 230 480 210 Q 500 200 512 180 Z"
        fill="#4ade80" fill-opacity="0.75"/>
  <path d="M 512 180 Q 470 160 425 145"
        stroke="#16a34a" stroke-opacity="0.6" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
