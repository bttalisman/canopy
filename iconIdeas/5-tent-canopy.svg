<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="tent1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="tent2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg5)"/>
  <!-- Back tent -->
  <path d="M512 220 L750 680 L274 680 Z" fill="url(#tent2)" opacity="0.4"/>
  <!-- Front tent -->
  <path d="M512 280 L720 660 L304 660 Z" fill="url(#tent1)" opacity="0.7"/>
  <!-- Tent pole -->
  <line x1="512" y1="280" x2="512" y2="660" stroke="#86efac" stroke-width="6" opacity="0.5"/>
  <!-- Flag on top -->
  <path d="M512 220 L512 280 L560 250 Z" fill="#86efac" opacity="0.9"/>
  <!-- Scalloped bottom edge (canopy draping) -->
  <path d="M304 660 Q360 620 408 660 Q456 700 512 660 Q568 620 616 660 Q664 700 720 660" stroke="#4ade80" stroke-width="8" fill="none" opacity="0.8"/>
  <!-- Ground line -->
  <line x1="240" y1="720" x2="784" y2="720" stroke="#4ade80" stroke-width="4" opacity="0.3"/>
  <!-- Small decorative dots (lights) -->
  <circle cx="408" cy="500" r="8" fill="#86efac" opacity="0.6"/>
  <circle cx="512" cy="450" r="8" fill="#bbf7d0" opacity="0.7"/>
  <circle cx="616" cy="500" r="8" fill="#86efac" opacity="0.6"/>
  <circle cx="460" cy="560" r="6" fill="#4ade80" opacity="0.5"/>
  <circle cx="564" cy="560" r="6" fill="#4ade80" opacity="0.5"/>
</svg>
