<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="leaf1b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="leaf2b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="leaf3b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="trunk1b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg1b)"/>
  <!-- Bonsai trunk - graceful S-curve with taper -->
  <!-- Main trunk -->
  <path d="M480 790 Q440 740 450 690 Q460 640 500 610 Q540 580 530 540 Q520 500 512 470"
        stroke="url(#trunk1b)" stroke-width="32" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Thinner continuation into canopy -->
  <path d="M512 470 Q505 440 512 420"
        stroke="#4ade80" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Small branch reaching right -->
  <path d="M530 545 Q570 520 600 530"
        stroke="#22c55e" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Small branch reaching left -->
  <path d="M460 650 Q420 630 400 640"
        stroke="#22c55e" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Exposed root lines -->
  <path d="M480 790 Q450 800 420 810" stroke="#16a34a" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M480 790 Q500 810 540 815" stroke="#16a34a" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Canopy layers -->
  <ellipse cx="512" cy="380" rx="260" ry="230" fill="url(#leaf2b)" opacity="0.3"/>
  <ellipse cx="512" cy="370" rx="200" ry="175" fill="url(#leaf1b)" opacity="0.5"/>
  <ellipse cx="512" cy="360" rx="125" ry="110" fill="url(#leaf3b)" opacity="0.4"/>
  <!-- Radiating leaf/branch shapes -->
  <g transform="translate(512,380)">
    <ellipse cx="0" cy="-140" rx="55" ry="90" fill="url(#leaf1b)" opacity="0.75" transform="rotate(0)"/>
    <ellipse cx="0" cy="-140" rx="50" ry="85" fill="url(#leaf2b)" opacity="0.65" transform="rotate(60)"/>
    <ellipse cx="0" cy="-140" rx="55" ry="90" fill="url(#leaf3b)" opacity="0.55" transform="rotate(120)"/>
    <ellipse cx="0" cy="-140" rx="50" ry="80" fill="url(#leaf1b)" opacity="0.65" transform="rotate(180)"/>
    <ellipse cx="0" cy="-140" rx="55" ry="85" fill="url(#leaf2b)" opacity="0.55" transform="rotate(240)"/>
    <ellipse cx="0" cy="-140" rx="50" ry="90" fill="url(#leaf3b)" opacity="0.75" transform="rotate(300)"/>
  </g>
  <!-- Center sky hole -->
  <circle cx="512" cy="380" r="35" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="512" cy="380" r="18" fill="#4ade80" opacity="0.9"/>
</svg>
