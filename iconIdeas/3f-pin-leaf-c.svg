<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="pin3f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="leafg3f" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="cgrad3f" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg3f)"/>
  <!-- Pin centered at x=341 (1/3), bottom point at y=1024, scaled up ~1.4x -->
  <!-- Pin body -->
  <path d="M341 1024 L170 610 Q105 460 170 320 Q235 180 341 150 Q447 180 512 320 Q577 460 512 610 Z" fill="url(#pin3f)" opacity="0.9"/>
  <!-- Pin inner dark circle -->
  <circle cx="341" cy="420" r="140" fill="#1a1a2e" opacity="0.7"/>
  <!-- Stylized C -->
  <path d="M377 345 A87 87 0 1 0 377 495"
        stroke="url(#cgrad3f)" stroke-width="40" fill="none" stroke-linecap="square"/>
  <!-- Leaf growing from top right of pin -->
  <path d="M341 150 Q420 30 530 70 Q590 100 555 200 Q520 270 420 235 Q375 215 341 150 Z" fill="url(#leafg3f)" opacity="0.9"/>
  <path d="M341 150 Q405 75 440 65" stroke="#16a34a" stroke-width="4" fill="none" opacity="0.5"/>
  <!-- Second smaller leaf to the left -->
  <path d="M341 150 Q255 50 195 95 Q165 125 195 185 Q230 230 285 200 Q318 182 341 150 Z" fill="#4ade80" opacity="0.7"/>
  <path d="M341 150 Q270 80 248 88" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.4"/>
</svg>
