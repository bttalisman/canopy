  <!-- Leaf vein -->
  <path d="M512 200 Q530 160 520 140" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- Second leaf (left) -->
  <path d="M512 200 Q460 130 420 160 Q400 180 420 220 Q440 250 480 230 Q500 220 512 200 Z" fill="#4ade80" opacity="0.7"/>
